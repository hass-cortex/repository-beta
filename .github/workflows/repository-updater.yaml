---
name: Repository Updater

# yamllint disable-line rule:truthy
on:
  repository_dispatch:
    types:
      - update

  # Manual trigger for forced re-runs
  workflow_dispatch:
    inputs:
      addon:
        description: 'App slug to update (leave empty for all)'
        required: false
        type: string
      force:
        description: 'Force update even if version unchanged'
        required: false
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  updater:
    name: Run repository updater for ${{ github.event.client_payload.addon || inputs.addon || 'all apps' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout metadata repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Repository Updater
        uses: hassio-addons/repository-updater@v2.0.1
        env:
          # Override git identity inside the action container — the action
          # tries to read user.email from the token's GitHub profile, but
          # private emails are returned as null and git refuses to commit.
          GIT_AUTHOR_NAME: github-actions[bot]
          GIT_AUTHOR_EMAIL: 41898282+github-actions[bot]@users.noreply.github.com
          GIT_COMMITTER_NAME: github-actions[bot]
          GIT_COMMITTER_EMAIL: 41898282+github-actions[bot]@users.noreply.github.com
        with:
          token: ${{ secrets.UPDATER_TOKEN }}
          repository: ${{ github.repository }}
          addon: ${{ github.event.client_payload.addon || inputs.addon || '' }}
          force: ${{ inputs.force || false }}
